services:
  - type: web
    name: ppe-detection-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: docker/Dockerfile.dev
    envVars:
      - key: APP_ENV
        value: prod
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        sync: false   # set this in Render UI to your Vercel URL, e.g. https://your-app.vercel.app
      - key: MODEL_PATH
        value: Model/ppe.pt
      - key: DETECTION_CONFIDENCE
        value: "0.5"
    healthCheckPath: /api/v1/health
